# Classic publish-profile deploy via azure/webapps-deploy@v2.
# v3 routes through OneDeploy which hangs on many App Service plans.

name: Build and deploy Node.js app to Azure Web App - Blinkugc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install backend production dependencies
        working-directory: ./backend
        run: |
          npm ci --omit=dev
          echo "Installed $(ls node_modules | wc -l) top-level packages"

      - name: Create deployment zip from backend/ (includes node_modules)
        run: |
          cd backend
          zip -rq ../release.zip . -x ".env" ".env.*"
          ls -lh ../release.zip
          echo "Top-level entries in zip:"
          unzip -l ../release.zip | head -20

      - name: 'Deploy to Azure Web App (v2 + publish profile)'
        uses: azure/webapps-deploy@v2
        timeout-minutes: 10
        with:
          app-name: 'Blinkugc'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
