# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Blinkugc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify backend builds (no node_modules shipped)
        working-directory: ./backend
        run: |
          npm ci --omit=dev --ignore-scripts --dry-run
          echo "Dependency tree validated"

      - name: Create deployment zip from backend/
        run: |
          cd backend
          zip -r ../release.zip . -x "node_modules/*" ".env" ".env.*"
          ls -lh ../release.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E958745AED6D4EFB88DD5AB72FD5B30E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5E604881A3FF46D7991377D585315082 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_008D12B4FCD74779BE8E4839D3633280 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        timeout-minutes: 10
        with:
          app-name: 'Blinkugc'
          slot-name: 'Production'
          package: release.zip
