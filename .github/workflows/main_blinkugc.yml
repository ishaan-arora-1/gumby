# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# Auth: publish profile (AZURE_WEBAPP_PUBLISH_PROFILE) — bypasses OneDeploy/OIDC issues.

name: Build and deploy Node.js app to Azure Web App - Blinkugc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify backend dependency tree
        working-directory: ./backend
        run: |
          npm ci --omit=dev --ignore-scripts --dry-run
          echo "Dependency tree validated"

      - name: Create deployment zip from backend/
        run: |
          cd backend
          zip -r ../release.zip . -x "node_modules/*" ".env" ".env.*"
          ls -lh ../release.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        timeout-minutes: 10
        with:
          app-name: 'Blinkugc'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
