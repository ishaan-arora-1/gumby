# Build the backend and deploy via Kudu /api/zipdeploy.
# Bypasses azure/webapps-deploy@v3 entirely — it routes through OneDeploy which
# hangs indefinitely on many App Service plans (open Microsoft issue).

name: Build and deploy Node.js app to Azure Web App - Blinkugc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify backend dependency tree
        working-directory: ./backend
        run: |
          npm ci --omit=dev --ignore-scripts --dry-run
          echo "Dependency tree validated"

      - name: Create deployment zip from backend/
        run: |
          cd backend
          zip -r ../release.zip . -x "node_modules/*" ".env" ".env.*"
          ls -lh ../release.zip

      - name: Deploy zip directly to Kudu /api/zipdeploy
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail

          # Parse credentials from the ZipDeploy entry in the publish profile.
          read -r KUDU_HOST KUDU_USER KUDU_PASS < <(python3 - <<'PY'
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          p = next(x for x in root if x.get("publishMethod") == "ZipDeploy")
          host = p.get("publishUrl").split(":")[0]
          print(host, p.get("userName"), p.get("userPWD"))
          PY
          )

          # Mask the password in logs.
          echo "::add-mask::$KUDU_PASS"
          echo "Deploying release.zip to https://$KUDU_HOST/api/zipdeploy"

          HTTP=$(curl -sS \
            -w "%{http_code}" \
            -o /tmp/zipdeploy_response.txt \
            --max-time 300 \
            --retry 2 --retry-delay 10 \
            -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @release.zip \
            "https://$KUDU_HOST/api/zipdeploy")

          echo "Kudu responded with HTTP $HTTP"
          echo "--- response body ---"
          cat /tmp/zipdeploy_response.txt || true
          echo
          echo "--- end ---"

          if [ "$HTTP" != "200" ] && [ "$HTTP" != "202" ]; then
            echo "::error::Kudu zipdeploy failed with HTTP $HTTP"
            exit 1
          fi
