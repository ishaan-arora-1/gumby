name: GumbyAI
options:
  bundleIdPrefix: com.ishaan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  schemePathPrefix: ""

schemes:
  GumbyAI:
    build:
      targets:
        GumbyAI: all
    run:
      config: Debug
      # NOTE: Do NOT set `storeKitConfiguration:` here. XcodeGen emits the
      # scheme reference with a leading slash ("/Products.storekit"), which
      # Xcode 26.x's workspace integrity analyzer cannot resolve — it fails
      # an assertion and crashes Xcode ~5s after the project opens.
      # For local StoreKit testing, select the config in Xcode instead:
      #   Product → Scheme → Edit Scheme → Run → Options →
      #   StoreKit Configuration → Products.storekit
      # (The Products.storekit file still lives in ios/ for that purpose.)
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  GumbyAI:
    type: application
    platform: iOS
    sources:
      - path: GumbyAI
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.ishaan.gumby
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: GumbyAI/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: Q7BK95FM87
        CODE_SIGN_ENTITLEMENTS: GumbyAI/GumbyAI.entitlements
        CODE_SIGN_STYLE: Automatic
