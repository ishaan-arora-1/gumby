name: GumbyAI
options:
  bundleIdPrefix: com.ishaan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  schemePathPrefix: ""

schemes:
  GumbyAI:
    build:
      targets:
        GumbyAI: all
    run:
      config: Debug
      # Local StoreKit testing config so credit-pack purchases work in the
      # simulator without App Store Connect. For production, create the
      # same product IDs in App Store Connect (this file is dev-only and is
      # not bundled into the app).
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  GumbyAI:
    type: application
    platform: iOS
    sources:
      - path: GumbyAI
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.ishaan.gumby
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: GumbyAI/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: Q7BK95FM87
        CODE_SIGN_ENTITLEMENTS: GumbyAI/GumbyAI.entitlements
        CODE_SIGN_STYLE: Automatic
