name: GumbyAI
options:
  bundleIdPrefix: com.ishaan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  GumbyAI:
    type: application
    platform: iOS
    sources:
      - path: GumbyAI
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.ishaan.gumby
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: GumbyAI/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: Q7BK95FM87
        CODE_SIGN_ENTITLEMENTS: GumbyAI/GumbyAI.entitlements
        CODE_SIGN_STYLE: Automatic
